services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3147:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8147
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8147:8000"
    env_file:
      - .env
    environment:
      - DEBUG=true
